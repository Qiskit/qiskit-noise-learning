name: Test Notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev,vis]"
      - name: Execute notebooks
        run: |
          jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=600 docs/noise_learner_demo.ipynb
          jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=600 docs/workflow_demo.ipynb
